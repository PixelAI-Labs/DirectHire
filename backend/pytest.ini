[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
pythonpath = .
testpaths = tests
filterwarnings =
    ignore::FutureWarning
    ignore:.*google.generativeai.*:FutureWarning
    ignore::DeprecationWarning:lazy_model.*
    ignore::pydantic.warnings.PydanticDeprecatedSince211:lazy_model.*
env =
    MONGODB_DB_NAME=directhire_test
    SECRET_KEY=test_secret_key_1234567890123456
    GEMINI_API_KEY=test_gemini_key
